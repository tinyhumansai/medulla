name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      # The e2e suite exercises the real opencode CLI when it is on PATH.
      # CI builds it from git (pinned to the version used for benchmarking)
      # so that leg runs here instead of skipping.
      - uses: oven-sh/setup-bun@v2

      - name: Install opencode from git
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.17.18 https://github.com/sst/opencode /tmp/opencode
          (cd /tmp/opencode && bun install --frozen-lockfile)
          sudo tee /usr/local/bin/opencode > /dev/null <<'SH'
          #!/bin/sh
          exec bun run /tmp/opencode/packages/opencode/src/index.ts "$@"
          SH
          sudo chmod +x /usr/local/bin/opencode
          opencode --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        timeout-minutes: 20
        run: cargo test --locked

      - name: Build
        run: cargo build --locked --all-targets

  coverage:
    name: Coverage (>= 95% lines)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Gate reusable SDK and UI logic at 95%. The excluded files are the
      # process/terminal/network drivers themselves: they depend on OS terminal
      # state or a live Socket.IO/tiny.place connection and are exercised
      # separately by the binary subprocess + direct-PTY E2E suite (`e2e_cli`)
      # and the live staging hub run, while their pure state machines, routing,
      # and data types remain counted. The orchestrator-hub split keeps the
      # dispatch runner + roster resolution + data types counted; only the
      # connect/boot/relay/handle IO drivers and the TUI hub wiring are excluded.
      # `worker_loop` joins them for the same reason `app_loop`/`event_loop` are
      # there: it is the worker TUI's entry point and tick loop, driving a real
      # terminal and real PTYs, and it is covered by the E2E suite instead.
      # `main` is the binary entry point — the thin dispatcher that wires the
      # four already-excluded drivers together — so it is excluded with them.
      # `executor_tests/live.rs` is the interactive-codex smoke/acceptance suite:
      # every test in it is `#[ignore]` because it needs a real authed `codex`
      # binary plus network, so it never runs in CI and its lines can only be
      # exercised by the live run — the same reason the drivers above are excluded.
      - name: Coverage gate
        timeout-minutes: 35
        run: >-
          cargo llvm-cov --locked
          --ignore-filename-regex 'src/tui/src/(app_loop|commands|event_loop|main|terminal|hub_relay|worker_loop)\.rs|src/tui/src/ui/onboarding/run\.rs|src/tui/src/worker/executor_tests/live\.rs|src/sdk/src/hub/(boot|socket|relay|handle)\.rs'
          --fail-under-lines 95
          --summary-only

  e2e-docker:
    name: E2E (docker + tmux + opencode)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      # Build the harness image once with a GHA layer cache (the Rust build
      # stage is the expensive layer; warm runs skip it entirely), then run the
      # suites in fully network-isolated containers via run-docker.sh.
      - name: Build harness image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: e2e/coordination/Dockerfile
          tags: medulla-e2e:latest
          load: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Coordination round trip (run.sh, --network none)
        run: SKIP_BUILD=1 bash e2e/coordination/run-docker.sh

      - name: Functional scenarios (tests.sh, --network none)
        run: docker run --rm --network none medulla-e2e:latest bash /app/e2e/coordination/tests.sh

      - name: Multi-agent scenarios (tests_multi.sh, --network none)
        run: docker run --rm --network none medulla-e2e:latest bash /app/e2e/coordination/tests_multi.sh

  rust-sdk-windows:
    name: Rust SDK (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      # No bun/opencode leg here: the core-socket runtime and the `/bin/sh`
      # e2e suites are unix-only (gated `#[cfg(unix)]`), so Windows just needs
      # the crate to compile and its cross-platform lib tests to pass.
      - name: Check
        run: cargo check --locked --all-targets

      - name: Test (lib)
        timeout-minutes: 20
        run: cargo test --locked --lib
