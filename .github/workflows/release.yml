name: Release

# One-click release: pick a semver bump, and this workflow updates
# Cargo.toml/Cargo.lock, commits, pushes a matching vX.Y.Z tag, builds the
# `medulla` binary for each supported target, and publishes a GitHub Release
# with the packaged binaries attached.
#
# Always releases from main (checks out and pushes back to main regardless of
# where it is dispatched). The release is created in this same workflow, so the
# GITHUB_TOKEN tag-push not firing other workflows is fine.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit, and tag
        id: bump
        run: |
          set -euo pipefail
          current="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)"
          IFS=. read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="${major}.$((minor + 1)).0" ;;
            patch) new_version="${major}.${minor}.$((patch + 1))" ;;
          esac
          # First `version =` line is the [package] version; mirror it into the
          # lockfile's own `medulla` entry so --locked builds stay consistent.
          sed -i "0,/^version = \"${current}\"$/s//version = \"${new_version}\"/" Cargo.toml
          python3 - "$current" "$new_version" <<'EOF'
          import re, sys
          current, new = sys.argv[1], sys.argv[2]
          lock = open("Cargo.lock").read()
          lock = lock.replace(
              f'name = "medulla"\nversion = "{current}"',
              f'name = "medulla"\nversion = "{new}"',
          )
          open("Cargo.lock", "w").write(lock)
          EOF
          tag="v${new_version}"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): ${tag}"
          # Annotated + explicit ref push: --follow-tags skips lightweight tags,
          # which left the tag unpushed and broke the build jobs' checkout.
          git tag -a "${tag}" -m "${tag}"
          git push origin HEAD:main "refs/tags/${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # No Intel macOS: the macos-13 queue stalls for hours and GitHub is
          # retiring Intel runners; Apple Silicon covers supported Macs.
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.tag.outputs.tag }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Unix packaging: a `.tar.gz` + a `<hex>  <name>` `.sha256` (shasum format).
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          pkg="medulla-${{ needs.tag.outputs.tag }}-${{ matrix.target }}"
          mkdir "${pkg}"
          cp "target/${{ matrix.target }}/release/medulla" "${pkg}/"
          cp README.md DEVELOPING.md config.example.toml "${pkg}/"
          tar -czf "${pkg}.tar.gz" "${pkg}"
          shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"

      # Windows packaging: a `.zip` (Compress-Archive) + a `.sha256` normalized
      # to the same lowercase `<hex>  <name>` shape the unix files use.
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "medulla-${{ needs.tag.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/medulla.exe" "$pkg/"
          Copy-Item README.md,DEVELOPING.md,config.example.toml "$pkg/"
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip"
          $hash = (Get-FileHash "$pkg.zip" -Algorithm SHA256).Hash.ToLower()
          # Single LF-terminated `<hex>  <name>` line, matching shasum's format.
          [System.IO.File]::WriteAllText("$pkg.zip.sha256", "$hash  $pkg.zip`n")

      - uses: actions/upload-artifact@v4
        with:
          name: medulla-${{ matrix.target }}
          path: |
            medulla-*.tar.gz
            medulla-*.tar.gz.sha256
            medulla-*.zip
            medulla-*.zip.sha256
          if-no-files-found: error

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Build the update manifest from the packaged assets' `.sha256` files.
      # Attached to the release so `releases/latest/download/latest.json` always
      # serves the newest version's manifest (consumed by `medulla update`).
      - name: Generate latest.json
        env:
          TAG: ${{ needs.tag.outputs.tag }}
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          python3 - <<'EOF'
          import datetime, glob, json, os

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          base = f"https://github.com/tinyhumansai/medulla/releases/download/{tag}"
          prefix = f"medulla-{tag}-"

          platforms = {}
          for sha_path in sorted(glob.glob("dist/*.sha256")):
              asset = os.path.basename(sha_path)[: -len(".sha256")]
              digest = open(sha_path).read().split()[0]
              stem = asset
              for ext in (".tar.gz", ".zip"):
                  if stem.endswith(ext):
                      stem = stem[: -len(ext)]
                      break
              triple = stem[len(prefix):] if stem.startswith(prefix) else stem
              platforms[triple] = {"url": f"{base}/{asset}", "sha256": digest}

          manifest = {
              "version": version,
              "tag": tag,
              "pubDate": datetime.datetime.now(datetime.timezone.utc)
              .strftime("%Y-%m-%dT%H:%M:%SZ"),
              "notes": f"https://github.com/tinyhumansai/medulla/releases/tag/{tag}",
              "platforms": platforms,
          }
          with open("dist/latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: medulla ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/latest.json
